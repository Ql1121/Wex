name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-36" "build-tools;36.0.0" 2>&1 | tail -5

      - name: Decode keystore
        run: echo "${{ secrets.WEX_JKS_B64 }}" | base64 -d > wex.jks

      - name: Build APK
        run: chmod +x gradlew && ./gradlew assembleDebug
        env:
          WEX_STORE_PASS: ${{ secrets.WEX_STORE_PASS }}
          WEX_KEY_PASS: ${{ secrets.WEX_KEY_PASS }}

      - name: Locate APK
        run: find . -name '*.apk' -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: build/outputs/apk/debug/*.apk